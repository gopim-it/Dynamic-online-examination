<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Dynamic Exam System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div class="dashboard-container w-full">
        <div class="glass-container fade-in" style="max-width: 1200px;">
            <div class="top-bar">
                <div class="header" style="margin-bottom: 0; text-align: left;">
                    <h1>Admin Portal</h1>
                </div>
                <div class="user-info">
                    Admin, <span id="userName">User</span>
                    <button class="btn btn-secondary" style="width: auto; padding: 8px 15px; margin-left: 15px;"
                        onclick="logout()">Logout</button>
                </div>
            </div>

            <!-- Dashboard Navigation -->
            <div style="margin-bottom: 30px; display: flex; gap: 15px;">
                <button class="btn" onclick="showSection('examsSection')">Manage Exams</button>
                <button class="btn btn-secondary" onclick="showSection('createExamSection')">Create New Exam</button>
            </div>

            <!-- Manage Exams Section -->
            <div id="examsSection">
                <h2>All Exams</h2>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Title</th>
                            <th>Duration (Mins)</th>
                            <th>Date Created</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="adminExamsTable">
                        <tr>
                            <td colspan="5">Loading exams...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Create Exam Section -->
            <div id="createExamSection" class="hidden">
                <div style="max-width: 600px;">
                    <h2>Create New Exam</h2>
                    <form id="createExamForm" style="margin-top: 20px;">
                        <div class="input-group">
                            <label>Title</label>
                            <input type="text" id="examTitle" required>
                        </div>
                        <div class="input-group">
                            <label>Description</label>
                            <textarea id="examDesc"></textarea>
                        </div>
                        <div class="input-group">
                            <label>Duration (Minutes)</label>
                            <input type="number" id="examDuration" min="1" required>
                        </div>
                        <button type="submit" class="btn">Create Exam & Add Questions</button>
                    </form>
                </div>
            </div>

            <!-- Add Questions Section -->
            <div id="addQuestionsSection" class="hidden">
                <h2 id="currentExamTitleDisplay" style="margin-bottom: 20px;">Add Questions</h2>

                <div style="display: flex; gap: 30px;">
                    <!-- Question Form -->
                    <div style="flex: 1;">
                        <form id="addQuestionForm" class="card">
                            <div class="input-group">
                                <label>Question Text</label>
                                <textarea id="qText" required></textarea>
                            </div>
                            <div class="input-group">
                                <label>Option A</label>
                                <input type="text" id="optA" required>
                            </div>
                            <div class="input-group">
                                <label>Option B</label>
                                <input type="text" id="optB" required>
                            </div>
                            <div class="input-group">
                                <label>Option C</label>
                                <input type="text" id="optC" required>
                            </div>
                            <div class="input-group">
                                <label>Option D</label>
                                <input type="text" id="optD" required>
                            </div>
                            <div class="input-group">
                                <label>Correct Option</label>
                                <select id="correctOpt" required>
                                    <option value="A">A</option>
                                    <option value="B">B</option>
                                    <option value="C">C</option>
                                    <option value="D">D</option>
                                </select>
                            </div>
                            <div class="input-group">
                                <label>Marks</label>
                                <input type="number" id="qMarks" value="1" min="1" required>
                            </div>
                            <button type="submit" class="btn">Add Question</button>
                            <button type="button" class="btn btn-secondary" onclick="showSection('examsSection')">Done
                                Adding</button>
                        </form>
                    </div>

                    <!-- Question List Preview -->
                    <div style="flex: 1;">
                        <h3>Added Questions Preview</h3>
                        <div id="questionsPreviewList" style="margin-top: 15px;">
                            <!-- Preview questions ->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Exam Results Section -->
                            <div id="examResultsSection" class="hidden">
                                <div
                                    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                                    <h2 id="resultExamTitle">Exam Results</h2>
                                    <button class="btn btn-secondary" style="width:auto;"
                                        onclick="showSection('examsSection')">Back</button>
                                </div>

                                <table class="data-table">
                                    <thead>
                                        <tr>
                                            <th>Student Name</th>
                                            <th>Email</th>
                                            <th>Score</th>
                                            <th>Percentage</th>
                                            <th>Date Submitted</th>
                                        </tr>
                                    </thead>
                                    <tbody id="adminResultsTable">
                                        <tr>
                                            <td colspan="5">Loading results...</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>

                        </div>
                        <div id="notification" class="notification hidden"></div>
                    </div>

                    <script src="/js/app.js"></script>
                    <script src="/js/admin.js"></script>
</body>

</html>
