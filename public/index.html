<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Online Exam System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="glass-container main-wrapper">
        <div class="header">
            <h1>Dynamic Online Exam System</h1>
            <p>Assess and process results dynamically</p>
        </div>
        
        <div class="auth-box fade-in" id="loginBox">
            <h2>Login</h2>
            <form id="loginForm">
                <div class="input-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" required>
                </div>
                <div class="input-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" class="btn">Sign In</button>
            </form>
            <p class="switch-form">Don't have an account? <span onclick="toggleAuth()">Register</span></p>
        </div>

        <div class="auth-box hidden fade-in" id="registerBox">
            <h2>Register</h2>
            <form id="registerForm">
                <div class="input-group">
                    <label for="regName">Full Name</label>
                    <input type="text" id="regName" required>
                </div>
                <div class="input-group">
                    <label for="regEmail">Email</label>
                    <input type="email" id="regEmail" required>
                </div>
                <div class="input-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" required>
                </div>
                <button type="submit" class="btn">Sign Up</button>
            </form>
            <p class="switch-form">Already have an account? <span onclick="toggleAuth()">Login</span></p>
        </div>

        <div id="notification" class="notification hidden"></div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
